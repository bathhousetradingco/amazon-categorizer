name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: supabase/setup-cli@v1

      - run: |
          supabase functions deploy analyze-receipt --project-ref xbayklklcdohewvnbglq --no-verify-jwt
          supabase functions deploy ask-ai --project-ref xbayklklcdohewvnbglq --no-verify-jwt
          supabase functions deploy create-link-token --project-ref xbayklklcdohewvnbglq --no-verify-jwt
          supabase functions deploy exchange-token --project-ref xbayklklcdohewvnbglq --no-verify-jwt
          supabase functions deploy parse-receipt --project-ref xbayklklcdohewvnbglq --no-verify-jwt
          supabase functions deploy plaid-webhook --project-ref xbayklklcdohewvnbglq --no-verify-jwt
          supabase functions deploy sync-plaid-transactions --project-ref xbayklklcdohewvnbglq --no-verify-jwt
          supabase functions deploy sync-transactions --project-ref xbayklklcdohewvnbglq --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
