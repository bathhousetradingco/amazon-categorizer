name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - uses: supabase/setup-cli@v1

      - name: Validate Edge Functions
        run: deno check supabase/functions/**/*.ts

      - run: |
          # JWT behavior is controlled in supabase/config.toml.
          supabase functions deploy analyze-receipt --project-ref xbayklklcdohewvnbglq
          supabase functions deploy ask-ai --project-ref xbayklklcdohewvnbglq
          supabase functions deploy create-link-token --project-ref xbayklklcdohewvnbglq
          supabase functions deploy exchange-token --project-ref xbayklklcdohewvnbglq
          supabase functions deploy plaid-webhook --project-ref xbayklklcdohewvnbglq
          supabase functions deploy sync-plaid-transactions --project-ref xbayklklcdohewvnbglq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
