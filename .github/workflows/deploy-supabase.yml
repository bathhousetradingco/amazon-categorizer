name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - uses: supabase/setup-cli@v1

      - name: Validate Edge Functions
        run: deno check supabase/functions/**/*.ts

      - name: Test Edge Functions
        run: deno test supabase/functions/**/*.test.ts

      - name: Apply Supabase migrations
        run: |
          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "::notice::SUPABASE_DB_URL is not configured; skipping database migrations."
            exit 0
          fi

          supabase db push --db-url "$SUPABASE_DB_URL" --yes
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Deploy Edge Functions (API mode, no Docker pull)
        run: |
          # JWT behavior is controlled in supabase/config.toml.
          supabase functions deploy analyze-receipt --use-api --project-ref xbayklklcdohewvnbglq
          supabase functions deploy ask-ai --use-api --project-ref xbayklklcdohewvnbglq
          supabase functions deploy create-link-token --use-api --project-ref xbayklklcdohewvnbglq
          supabase functions deploy exchange-token --use-api --project-ref xbayklklcdohewvnbglq
          supabase functions deploy plaid-webhook --use-api --project-ref xbayklklcdohewvnbglq
          supabase functions deploy sync-plaid-transactions --use-api --project-ref xbayklklcdohewvnbglq
          supabase functions deploy amazon-business-auth-start --use-api --project-ref xbayklklcdohewvnbglq
          supabase functions deploy amazon-business-auth-callback --use-api --project-ref xbayklklcdohewvnbglq
          supabase functions deploy amazon-business-sync --use-api --project-ref xbayklklcdohewvnbglq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
