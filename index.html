
<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bathhouse Categorizer</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%9B%81%3C/text%3E%3C/svg%3E">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

<link rel="stylesheet" href="assets/app.css">
</head>

<body>
<main class="appShell">
<h2>Bathhouse Categorizer</h2>
<input type="file" id="csvFile" class="fileInput" accept=".csv">

<div id="mappingPanel" class="panel" style="display:none;"></div>
<div id="authPanel" class="panel">
  <h3>Login</h3>

  <input type="email" id="loginEmail" placeholder="Email" style="margin-bottom:8px;">
  <input type="password" id="loginPassword" placeholder="Password" style="margin-bottom:8px;">

  <button onclick="login()" style="background:#2e7d32; color:white; width:100%;">
    Login
  </button>
</div>
  
<div id="app" style="display:none;">
<div class="appGrid">
<div class="mainColumn">
<div class="panel appCard controlsCard integratedCard">
  <h3>Transaction Navigator</h3>

  <button id="searchBtn" class="category-btn" style="background:#ff9800; margin-bottom:8px;" onclick="openSearchModal()">🔎 Search</button>
  <button id="clearSearchBtn" class="category-btn" style="background:#c62828; margin-bottom:8px; display:none;" onclick="clearSearchFilter()">Clear Search Filter</button>

  <button id="quickActionsToggleBtn" class="menuToggleBtn" onclick="toggleQuickActionsMenu()">
  ☰ Quick Actions
  </button>

  <div id="quickActionsMenu" class="quickActionsMenu">
    <button id="createTransactionBtn" class="category-btn" style="background:#1565c0; margin-bottom:8px;" onclick="openCreateTransactionModal()">
    ➕ Create Transaction
    </button>
    <button class="category-btn" style="background:#2e7d32; margin-bottom:8px;" onclick="connectBank()">🏦 Connect Bank</button>
    <button class="category-btn" style="background:#000; margin-bottom:0;" onclick="forcePlaidSync()">🔄 Sync Bank Now</button>
    <button class="category-btn" style="background:#374151; margin-top:8px; margin-bottom:8px;" onclick="connectAmazonBusiness()">Connect Amazon Business</button>
    <button class="category-btn" style="background:#92400e; margin-bottom:0;" onclick="syncAmazonBusiness()">Sync Amazon Business</button>
  </div>

  <button id="dateFilterBtn" class="filterTriggerBtn" onclick="openDateFilterModal()">🗓 Date Filter</button>
  <div id="dateFilterSummary" class="filterSummary">All dates</div>
  <div class="filterGrid">
    <label>
      Transaction Type
      <select id="transactionFilter" onchange="applyTransactionTypeFilter()">
        <option value="all">All Transactions</option>
        <option value="uncategorized">Show Only Uncategorized</option>
        <option value="categorized">Show Only Categorized</option>
        <option value="with_receipt">Transactions with Receipt</option>
        <option value="without_receipt">Transactions without Receipt</option>
      </select>
    </label>
  </div>
  <button id="clearDateBtn" class="category-btn" style="background:#6b7280; margin-top:8px; display:none;" onclick="clearDateFilter()">Clear Filters</button>

  <div class="progress-bar-container">
    <div id="progressBar" class="progress-bar"></div>
  </div>
  <div id="positionIndicator" class="small" style="margin-top:4px;"></div>
  <div id="progressText" class="small"></div>
</div>

<div id="transactionReviewPanel" class="panel appCard integratedCard">
  <section class="uiSection transactionHeaderSection">
    <div class="sectionLabel">Transaction Header</div>
    <div id="currentCategory" class="small"></div>
    <h3 id="cardTitle"></h3>
    <div id="cardMeta" class="small"></div>
  </section>

  <div id="categoryButtons"></div>

  <section class="uiSection">
    <div class="sectionLabel">Line Items</div>
    <div id="splitSummary" class="lineItemsPanel"></div>
  </section>

  <button onclick="resetSplits()" style="background:#c62828; color:white; padding:10px 14px; border-radius:10px; margin-top:10px; width:100%;">
    Reset Splits
  </button>
</div>
</div>

<div class="panel totalsPanel stickyColumn">
  <h4>Totals & Planning</h4>
  <div id="totals"></div>
  <button onclick="openQaReviewModal()" class="exportBtn" style="background:#92400e; margin-top:8px;">Review QA</button>
  <button onclick="exportExcel()" class="exportBtn">Export to Excel</button>
</div>

</div>
</div>

<div id="modalOverlay" class="modalOverlay">
<div class="modalBox">
<div class="modalDragHandle" aria-hidden="true"></div>
<h3 id="modalTitle"></h3>
<div id="modalContent"></div>
<button id="modalCloseBtn" class="modalClose" onclick="closeModal()" style="display:none;">Close</button>
</div>
</div>
<div id="keypadOverlay" class="keypadOverlay" onclick="handleKeypadBackdrop(event)">
  <div class="keypadSheet" role="dialog" aria-label="Amount keypad">
    <div id="keypadTitle" class="small" style="margin-bottom:8px;font-weight:700;color:#172033;">Enter amount</div>
    <div id="keypadDisplay" class="keypadDisplay">$0.00</div>
    <div class="keypadGrid" id="keypadGrid"></div>
    <div id="keypadHint" class="keypadHint"></div>
  </div>
</div>
</main>

<script src="assets/app.js"></script>
</body>
</html>
